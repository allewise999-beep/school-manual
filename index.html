<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>校務行政系統 操作手冊</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
<style>
:root{
  --left:288px; --right:248px; --accent:#265b98; --accent-soft:#e7f0fa;
  --navy:#1f3958; --gold:#f0a01e;
  --text:#1b2733; --muted:#6b7785; --line:#e6e9ee; --bg:#fff; --side-bg:#f7f8fa;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{font-family:-apple-system,"PingFang TC","Microsoft JhengHei","Segoe UI",sans-serif;
  color:var(--text);background:var(--bg);line-height:1.7;font-size:16px;}
a{color:var(--accent);text-decoration:none;}

/* ========== 入口首頁 ========== */
#home{display:none;}
#home.show{display:block;}
.hero{background:var(--navy);border-bottom:3px solid var(--gold);padding:60px 24px 50px;text-align:center;}
.hero .sys{font-size:14px;color:var(--gold);letter-spacing:2px;font-weight:600;}
.hero h1{font-size:36px;font-weight:800;margin:10px 0 6px;color:#fff;}
.hero p{color:#c7d6e8;margin:0 0 26px;font-size:16px;}
.home-search{max-width:560px;margin:0 auto;position:relative;}
.home-search input{width:100%;padding:15px 18px 15px 46px;border:1px solid #345579;border-radius:12px;
  font-size:16px;outline:none;background:#fff;}
.home-search input:focus{border-color:var(--gold);}
.home-search .si{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--muted);}
.home-wrap{max-width:1040px;margin:0 auto;padding:36px 24px 100px;}
.cat-block{margin-bottom:40px;}
.cat-head{display:flex;align-items:center;gap:10px;margin:0 0 16px;}
.cat-dot{width:10px;height:10px;border-radius:50%;}
.cat-head h2{font-size:18px;font-weight:700;margin:0;}
.cat-head .cnt{font-size:13px;color:var(--muted);}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;}
.card{display:flex;align-items:center;justify-content:space-between;gap:10px;
  padding:16px 18px;border:1px solid var(--line);border-radius:12px;background:#fff;cursor:pointer;transition:.15s;}
.card:hover{border-color:var(--accent);box-shadow:0 4px 16px rgba(31,57,88,.12);transform:translateY(-2px);}
.card .ct{font-size:15px;font-weight:600;color:var(--text);}
.card .cs{font-size:12px;color:var(--muted);margin-top:2px;}
.card .arr{color:var(--muted);flex:0 0 auto;}
.no-result{color:var(--muted);padding:20px 4px;}

/* ========== 內頁 ========== */
#reader{display:none;}
#reader.show{display:block;}

/* 左：大目錄 */
#sidebar{position:fixed;top:0;left:0;width:var(--left);height:100vh;overflow-y:auto;
  background:var(--side-bg);border-right:1px solid var(--line);}
.brand{padding:18px 20px 14px;background:var(--navy);cursor:pointer;}
.brand .back{font-size:12px;color:var(--gold);}
.brand .title{font-size:17px;font-weight:700;margin-top:4px;color:#fff;}
.l-search{padding:12px 16px;}
.l-search input{width:100%;padding:9px 12px;border:1px solid var(--line);border-radius:8px;
  font-size:13px;background:#fff;outline:none;}
.l-search input:focus{border-color:var(--accent);}
.nav{padding:4px 10px 40px;}
.cat-label{font-size:12px;font-weight:700;color:var(--navy);letter-spacing:1px;
  padding:18px 10px 8px;border-bottom:1px solid var(--line);margin-bottom:4px;}
.m-link{display:block;padding:9px 12px;border-radius:8px;color:#33414f;
  font-size:15px;font-weight:500;border-left:3px solid transparent;cursor:pointer;}
.m-link:hover{background:#eaeef3;}
.m-link.active{background:var(--accent-soft);color:var(--accent);font-weight:700;border-left-color:var(--accent);}

/* 中：內容 */
#main{margin-left:var(--left);margin-right:var(--right);}
.content-wrap{max-width:820px;margin:0 auto;padding:46px 48px 120px;}
#content h1{font-size:30px;font-weight:800;margin:0 0 8px;}
#content h2{font-size:23px;font-weight:700;margin:46px 0 14px;padding-top:14px;border-top:1px solid var(--line);scroll-margin-top:20px;}
#content h3{font-size:18px;font-weight:700;margin:28px 0 10px;scroll-margin-top:20px;}
#content h1:first-child{border:none;}
#content p{margin:12px 0;}
#content img{max-width:100%;border:1px solid var(--line);border-radius:10px;margin:14px 0;box-shadow:0 2px 10px rgba(0,0,0,.05);}
#content ul,#content ol{padding-left:24px;}#content li{margin:5px 0;}
#content table{border-collapse:collapse;width:100%;margin:18px 0;font-size:14px;}
#content th,#content td{border:1px solid var(--line);padding:9px 12px;text-align:left;}
#content th{background:#f2f5f9;font-weight:600;}
#content blockquote{margin:16px 0;padding:12px 18px;background:#f7f8fa;border-left:4px solid #c8d0db;border-radius:0 8px 8px 0;color:#42505e;}
#content hr{border:none;border-top:1px solid var(--line);margin:34px 0;}
#content code{background:#f0f2f5;padding:2px 6px;border-radius:5px;font-size:13px;}
.hint{display:flex;gap:12px;padding:14px 16px;border-radius:10px;margin:18px 0;font-size:14px;}
.hint .ico{font-weight:700;flex:0 0 auto;}.hint p{margin:4px 0;}
.hint-info{background:#eef4ff;border:1px solid #cfe0ff;}.hint-info .ico{color:#2b6cff;}
.hint-warning{background:#fff8e6;border:1px solid #ffe7a3;}.hint-warning .ico{color:#c98a00;}
.hint-danger{background:#fdeef0;border:1px solid #f6c9cf;}.hint-danger .ico{color:#d8344a;}
.hint-success{background:#edf9f0;border:1px solid #c3eccd;}.hint-success .ico{color:#1f9d52;}
.tabs{margin:20px 0;border:1px solid var(--line);border-radius:10px;overflow:hidden;}
.tab-nav{display:flex;flex-wrap:wrap;background:#f2f5f9;border-bottom:1px solid var(--line);}
.tab-nav button{border:none;background:none;padding:11px 18px;font-size:14px;cursor:pointer;color:var(--muted);font-weight:600;border-bottom:2px solid transparent;font-family:inherit;}
.tab-nav button.active{color:var(--accent);background:#fff;border-bottom-color:var(--accent);}
.tab-pane{display:none;padding:18px 20px;}.tab-pane.active{display:block;}.tab-pane img{margin-top:6px;}
.notice{padding:20px 22px;border-radius:12px;background:#fff8e6;border:1px solid #ffe7a3;font-size:14px;line-height:1.8;}
.notice code{background:#fff;border:1px solid #eed9a0;padding:2px 6px;border-radius:5px;}

/* 右：小目錄（本頁章節） */
#toc{position:fixed;top:0;right:0;width:var(--right);height:100vh;overflow-y:auto;
  padding:46px 20px 60px;border-left:1px solid var(--line);background:#fff;}
.toc-head{font-size:12px;font-weight:700;color:var(--muted);letter-spacing:1px;
  margin:0 0 12px;padding-bottom:8px;border-bottom:1px solid var(--line);}
#toc-list{list-style:none;margin:0;padding:0;}
#toc-list li a{display:block;padding:5px 10px;border-radius:6px;line-height:1.5;
  border-left:2px solid transparent;}
#toc-list a.lvl-2{font-size:13.5px;color:#3d4854;font-weight:500;}
#toc-list a.lvl-3{font-size:12.5px;color:var(--muted);padding-left:22px;font-weight:400;}
#toc-list a:hover{background:#f2f5f9;}
#toc-list a.active{color:var(--accent);font-weight:700;border-left-color:var(--accent);background:var(--accent-soft);}

/* 轉場動畫 */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:none;}}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes popIn{from{opacity:0;transform:translateY(10px) scale(.99);}to{opacity:1;transform:none;}}
.fade-in{animation:fadeUp .7s cubic-bezier(.22,.61,.36,1) both;}
#home.show .hero{animation:fadeIn .7s ease both;}
#home.show .cat-block{animation:fadeUp .75s cubic-bezier(.22,.61,.36,1) both;}
#home.show .cat-block:nth-child(2){animation-delay:.12s;}
#home.show .cat-block:nth-child(3){animation-delay:.24s;}
#home.show .cat-block:nth-child(4){animation-delay:.36s;}
.card{transition:transform .15s,box-shadow .15s,border-color .15s;}
.m-link{transition:background .15s,color .15s,border-color .15s;}
#toc-list a{transition:background .15s,color .15s,border-color .15s;}
@media(prefers-reduced-motion:reduce){.fade-in,#home.show .hero,#home.show .cat-block{animation:none;}}

.menu-btn{display:none;}
@media(max-width:1180px){
  :root{--right:0px;}
  #toc{display:none;}
  #main{margin-right:0;}
}
@media(max-width:880px){
  #sidebar{transform:translateX(-100%);transition:.25s;z-index:50;box-shadow:0 0 30px rgba(0,0,0,.15);}
  #sidebar.open{transform:translateX(0);}
  #main{margin-left:0;}
  .content-wrap{padding:70px 22px 100px;}
  #reader.show .menu-btn{display:flex;position:fixed;top:14px;left:14px;z-index:60;width:42px;height:42px;
    align-items:center;justify-content:center;background:var(--navy);color:#fff;border:none;
    border-radius:10px;font-size:20px;cursor:pointer;box-shadow:0 2px 10px rgba(0,0,0,.2);}
  .hero h1{font-size:28px;}
}
</style>
</head>
<body>
<button class="menu-btn" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>

<!-- ===== 入口首頁 ===== -->
<section id="home">
  <div class="hero">
    <div class="sys">校務行政系統</div>
    <h1>操作手冊中心</h1>
    <p>選擇下方手冊，或直接搜尋你要的功能</p>
    <div class="home-search">
      <span class="si"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg></span>
      <input id="home-search" type="text" placeholder="搜尋手冊名稱…">
    </div>
  </div>
  <div class="home-wrap" id="home-wrap"></div>
</section>

<!-- ===== 內頁（三欄） ===== -->
<section id="reader">
  <aside id="sidebar">
    <div class="brand" id="brand">
      <div class="back">← 回手冊中心</div>
      <div class="title">操作手冊</div>
    </div>
    <div class="l-search"><input id="manual-search" type="text" placeholder="搜尋手冊…"></div>
    <nav class="nav" id="nav"></nav>
  </aside>
  <main id="main"><div class="content-wrap"><article id="content"></article></div></main>
  <aside id="toc">
    <div class="toc-head">本頁目錄</div>
    <ul id="toc-list"></ul>
  </aside>
</section>

<script>
/* ============================================================
   手冊清單：要新增手冊時，在這裡加一行即可
   { cat:"分類", title:"顯示名稱", file:"content/檔名.md" }
   ============================================================ */
const MANUALS = [
  { cat: "教務", title: "學籍管理", file: "content/學籍管理.md" },
  { cat: "教務", title: "課務管理", file: "content/課務管理.md" },
  { cat: "教務", title: "成績管理", file: "content/成績管理.md" },
  { cat: "教務", title: "學期成績報表", file: "content/學期成績報表.md" },
  { cat: "教務", title: "教學計畫", file: "content/教學計畫.md" },
  { cat: "教務", title: "升級與編班", file: "content/升級與編班.md" },
  { cat: "教務", title: "異動管理", file: "content/異動管理.md" },
  { cat: "教務", title: "新生管理", file: "content/新生管理.md" },
  { cat: "教務", title: "公告管理", file: "content/公告管理.md" },
  { cat: "教務", title: "行事曆管理", file: "content/行事曆管理.md" },
  { cat: "教務", title: "會議管理", file: "content/會議管理.md" },
  { cat: "學務", title: "學生出缺席", file: "content/學生出缺席.md" },
  { cat: "學務", title: "學生獎懲", file: "content/學生獎懲.md" },
  { cat: "學務", title: "生活評量", file: "content/生活評量.md" },
  { cat: "學務", title: "學生輔導資料", file: "content/學生輔導資料.md" },
  { cat: "學務", title: "認輔作業", file: "content/認輔作業.md" },
  { cat: "學務", title: "學生健康資料", file: "content/學生健康資料.md" },
  { cat: "學務", title: "校園志工管理", file: "content/校園志工管理.md" },
  { cat: "學務", title: "新版幹部管理", file: "content/新版幹部管理.md" },
  { cat: "學務", title: "競賽獎勵管理", file: "content/競賽獎勵管理.md" },
  { cat: "學務", title: "學生概況查詢", file: "content/學生概況查詢.md" },
  { cat: "人事", title: "人事資料管理", file: "content/人事資料管理.md" },
  { cat: "人事", title: "教師概況查詢", file: "content/教師概況查詢.md" },
  { cat: "人事", title: "縣內介聘", file: "content/縣內介聘.md" },
  { cat: "人事", title: "新版人員帳號管理", file: "content/新版人員帳號管理.md" },
  { cat: "系統與其他", title: "全國圖書館", file: "content/全國圖書館.md" },
  { cat: "系統與其他", title: "場地預約", file: "content/場地預約.md" },
  { cat: "系統與其他", title: "學費代收", file: "content/學費代收.md" },
  { cat: "系統與其他", title: "測驗工具", file: "content/測驗工具.md" },
  { cat: "系統與其他", title: "電腦閱卷", file: "content/電腦閱卷.md" },
  { cat: "系統與其他", title: "能力檢測", file: "content/能力檢測.md" },
  { cat: "系統與其他", title: "校內填報", file: "content/校內填報.md" },
  { cat: "系統與其他", title: "線上填報", file: "content/線上填報.md" },
  { cat: "系統與其他", title: "簡訊管理", file: "content/簡訊管理.md" },
];
const CAT_COLOR = { "教務":"#265b98", "學務":"#1f9d52", "人事":"#c98a00", "系統與其他":"#8b5cf6" };

marked.setOptions({ gfm:true, breaks:false });
const HINT_ICON = { info:'ℹ️', warning:'⚠️', danger:'⛔', success:'✅' };

function renderHints(text){
  const re=/\{%\s*hint\s+style="(\w+)"\s*%\}([\s\S]*?)\{%\s*endhint\s*%\}/g;
  let out='',last=0,m;
  while((m=re.exec(text))){
    out+=marked.parse(text.slice(last,m.index));
    const ico=HINT_ICON[m[1]]||'ℹ️';
    out+=`<div class="hint hint-${m[1]}"><div class="ico">${ico}</div><div>${marked.parse(m[2].trim())}</div></div>`;
    last=re.lastIndex;
  }
  out+=marked.parse(text.slice(last)); return out;
}
let tabSeq=0;
function renderTabs(inner){
  const re=/\{%\s*tab\s+title="([^"]*)"\s*%\}([\s\S]*?)\{%\s*endtab\s*%\}/g;
  let m,navs='',panes='',idx=0;const gid='tabs'+(tabSeq++);
  while((m=re.exec(inner))){
    const a=idx===0?' active':'';
    navs+=`<button class="tab-btn${a}" data-g="${gid}" data-i="${idx}">${m[1]}</button>`;
    panes+=`<div class="tab-pane${a}" data-g="${gid}" data-i="${idx}">${renderHints(m[2].trim())}</div>`;
    idx++;
  }
  return `<div class="tabs"><div class="tab-nav">${navs}</div><div class="tab-body">${panes}</div></div>`;
}
function render(md){
  const re=/\{%\s*tabs\s*%\}([\s\S]*?)\{%\s*endtabs\s*%\}/g;
  let out='',last=0,m;
  while((m=re.exec(md))){out+=renderHints(md.slice(last,m.index));out+=renderTabs(m[1]);last=re.lastIndex;}
  out+=renderHints(md.slice(last)); return out;
}

const homeEl=document.getElementById('home');
const readerEl=document.getElementById('reader');
const content=document.getElementById('content');
const nav=document.getElementById('nav');
const tocList=document.getElementById('toc-list');
const ARR='<svg class="arr" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 6l6 6-6 6"/></svg>';
let currentIdx=-1, tocItems=[], observer=null, mLinks=[];

/* ===== 首頁卡片 ===== */
const homeWrap=document.getElementById('home-wrap');
function buildHome(filter){
  filter=(filter||'').trim().toLowerCase(); homeWrap.innerHTML='';
  const cats=[...new Set(MANUALS.map(m=>m.cat))]; let shown=0;
  cats.forEach(cat=>{
    const list=MANUALS.map((m,i)=>({m,i})).filter(o=>o.m.cat===cat && (!filter||o.m.title.toLowerCase().includes(filter)));
    if(!list.length) return; shown+=list.length;
    const block=document.createElement('div'); block.className='cat-block';
    const color=CAT_COLOR[cat]||'#265b98';
    block.innerHTML=`<div class="cat-head"><span class="cat-dot" style="background:${color}"></span><h2>${cat}</h2><span class="cnt">${list.length} 份</span></div>`;
    const grid=document.createElement('div'); grid.className='cards';
    list.forEach(o=>{const c=document.createElement('div');c.className='card';
      c.innerHTML=`<div><div class="ct">${o.m.title}</div><div class="cs">操作手冊</div></div>${ARR}`;
      c.addEventListener('click',()=>{location.hash='#'+encodeURIComponent(o.m.title);});grid.appendChild(c);});
    block.appendChild(grid); homeWrap.appendChild(block);
  });
  if(!shown) homeWrap.innerHTML='<div class="no-result">找不到符合「'+filter+'」的手冊。</div>';
}
buildHome('');
document.getElementById('home-search').addEventListener('input',e=>buildHome(e.target.value));

/* ===== 左側大目錄：分類 + 手冊連結 ===== */
let lastCat=null;
MANUALS.forEach((man,i)=>{
  if(man.cat!==lastCat){
    const c=document.createElement('div'); c.className='cat-label'; c.textContent=man.cat;
    nav.appendChild(c); lastCat=man.cat;
  }
  const a=document.createElement('div'); a.className='m-link'; a.textContent=man.title;
  a.dataset.i=i;
  a.addEventListener('click',()=>{ location.hash='#'+encodeURIComponent(man.title); });
  nav.appendChild(a); mLinks.push(a);
});

async function loadManual(i){
  const man=MANUALS[i]; currentIdx=i;
  mLinks.forEach((a,k)=>a.classList.toggle('active',k===i));
  content.innerHTML='<p style="color:#6b7785">載入中…</p>';
  tocList.innerHTML='';
  let md;
  try{
    const res=await fetch(man.file);
    if(!res.ok) throw new Error(res.status);
    md=await res.text();
  }catch(e){
    content.innerHTML='<div class="notice"><b>無法載入內容。</b><br>'+
      '這個網站需要透過網路伺服器開啟（例如上傳到 GitHub Pages），無法用滑鼠雙擊直接開啟。<br><br>'+
      '想在本機看完整成品，請改開同資料夾的 <code>預覽_全部手冊.html</code>。</div>';
    return;
  }
  if(observer) observer.disconnect();
  content.innerHTML=render(md);
  content.querySelectorAll('h2').forEach(h=>{
    if(h.textContent.trim()==='目錄'){
      let n=h.nextElementSibling; h.remove();
      while(n && n.tagName!=='HR'){const x=n;n=n.nextElementSibling;x.remove();}
      if(n) n.remove();
    }
  });
  // 右側小目錄
  tocItems=[]; let n=0;
  content.querySelectorAll('h2, h3').forEach(h=>{
    const id='sec-'+(n++); h.id=id;
    const li=document.createElement('li');
    const a=document.createElement('a');
    a.href='#'; a.textContent=h.textContent;
    a.className=h.tagName==='H3'?'lvl-3':'lvl-2';
    a.addEventListener('click',ev=>{ev.preventDefault();
      document.getElementById(id).scrollIntoView({behavior:'smooth',block:'start'});});
    li.appendChild(a); tocList.appendChild(li);
    tocItems.push({a,h});
  });
  observer=new IntersectionObserver(es=>{es.forEach(en=>{if(en.isIntersecting){
    const id=en.target.id; tocItems.forEach(it=>it.a.classList.toggle('active',it.h.id===id));}});
  },{rootMargin:'0px 0px -75% 0px',threshold:0});
  tocItems.forEach(it=>observer.observe(it.h));
  const cw=document.querySelector('.content-wrap');
  cw.classList.remove('fade-in'); void cw.offsetWidth; cw.classList.add('fade-in');
  window.scrollTo(0,0);
}

content.addEventListener('click',e=>{
  const b=e.target.closest('.tab-btn'); if(!b)return;
  const g=b.dataset.g,i=b.dataset.i;
  document.querySelectorAll(`.tab-btn[data-g="${g}"]`).forEach(x=>x.classList.toggle('active',x.dataset.i===i));
  document.querySelectorAll(`.tab-pane[data-g="${g}"]`).forEach(x=>x.classList.toggle('active',x.dataset.i===i));
});

/* 左側手冊搜尋 */
document.getElementById('manual-search').addEventListener('input',e=>{
  const q=e.target.value.trim().toLowerCase();
  mLinks.forEach((a,k)=>{a.style.display=MANUALS[k].title.toLowerCase().includes(q)?'':'none';});
  document.querySelectorAll('.cat-label').forEach(c=>{
    let nx=c.nextElementSibling, any=false;
    while(nx && !nx.classList.contains('cat-label')){
      if(nx.classList.contains('m-link') && nx.style.display!=='none') any=true;
      nx=nx.nextElementSibling;
    }
    c.style.display=any?'':'none';
  });
});
document.getElementById('brand').addEventListener('click',()=>{location.hash='';});

/* ===== 路由 ===== */
function route(){
  const h=decodeURIComponent(location.hash.replace(/^#/,''));
  const i=MANUALS.findIndex(m=>m.title===h);
  if(i<0){
    homeEl.classList.add('show'); readerEl.classList.remove('show');
    document.title='校務行政系統 操作手冊'; window.scrollTo(0,0);
  } else {
    homeEl.classList.remove('show'); readerEl.classList.add('show');
    document.getElementById('sidebar').classList.remove('open');
    document.title=MANUALS[i].title+'｜操作手冊';
    loadManual(i);
  }
}
window.addEventListener('hashchange',route);
route();
</script>
